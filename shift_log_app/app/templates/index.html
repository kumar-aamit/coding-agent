<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shift Handoff Log</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 2rem; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.3rem; }
        input, textarea, button { width: 100%; padding: 0.5rem; }
        #summary { margin-top: 1rem; padding: 1rem; border: 1px solid #ccc; background:#f9f9f9; }
    </style>
</head>
<body>
    <h1>Shift Handoff Log</h1>
    <form id="logForm">
        <div class="form-group">
            <label for="shift">Shift</label>
            <select id="shift" name="shift" required>
                <option value="A">Shift A</option>
                <option value="B">Shift B</option>
                <option value="C">Shift C</option>
            </select>
        </div>
        <div class="form-group">
            <label for="operator">Operator</label>
            <input type="text" id="operator" name="operator" required />
        </div>
        <div class="form-group">
            <label for="notes">Notes</label>
            <textarea id="notes" name="notes" rows="4" required></textarea>
        </div>
        <button type="submit">Submit Log</button>
    </form>

    <h2>Open Issues Summary</h2>
    <button id="summarizeBtn">Summarize Open Issues</button>
    <div id="summary">Summary will appear here...</div>

    <script>
        document.getElementById('logForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            const data = Object.fromEntries(formData.entries());
            const response = await fetch('/logs', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            if (response.ok) {
                alert('Log submitted');
                // Clear form
                document.getElementById('logForm').reset();
            } else {
                alert('Error submitting log');
            }
        });

        document.getElementById('summarizeBtn').addEventListener('click', async function() {
            const resp = await fetch('/summarize');
            const result = await resp.json();
            document.getElementById('summary').textContent = result.summary;
        });
    </script>
</body>
</html>
