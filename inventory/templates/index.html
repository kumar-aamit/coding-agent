<!DOCTYPE html>
<html>
<head>
    <title>Inventory Tracker</title>
    <style>
        body {font-family: Arial, sans-serif; margin: 2rem;}
        table {border-collapse: collapse; width: 100%;}
        th, td {border: 1px solid #ddd; padding: 8px; text-align: left;}
        th {background-color: #f2f2f2;}
        .low {background-color: #ffcccc;}
    </style>
</head>
<body>
    <h1>Inventory List</h1>
    <table>
        <thead>
            <tr>
                <th>Part Number</th>
                <th>Quantity</th>
                <th>Location</th>
                <th>Suggestion</th>
            </tr>
        </thead>
        <tbody>
            {% for part in parts %}
            <tr {% if part.qty < 5 %}class="low"{% endif %}>
                <td>{{ part.part_number }}</td>
                <td>{{ part.qty }}</td>
                <td>{{ part.location }}</td>
                <td>{{ suggestion.suggestion if suggestion is defined else '' }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
