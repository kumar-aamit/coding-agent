version: '3.8'

services:
  downtime-app:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./app/data:/app/data
    env_file:
      - .env.example
    environment:
      - VLLM_BASE_URL=http://host.docker.internal:8000/v1
    extra_hosts:
      - "host.docker.internal:127.0.0.1"

  # Note: vLLM service is expected to be running externally
  # This app assumes vLLM is already running on the host machine

# Network configuration
networks:
  default:
    name: downtime-network